name: together_music
description: "Together Music - 一起听歌应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP 客户端
  dio: ^5.7.0

  # WebSocket STOMP
  stomp_dart_client: ^2.0.0

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.6.2

  # 本地存储（Token 持久化）
  shared_preferences: ^2.3.3

  # 文件选择（上传音频）
  file_picker: ^8.1.4

  # 图片缓存
  cached_network_image: ^3.4.1

  # 非 Web 音频播放
  just_audio: ^0.10.4

  # 工具
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
